name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'dockerfiles/**'
      - 'config.yaml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'dockerfiles/**'
      - 'config.yaml'
  workflow_dispatch:

jobs:
  # 第一步：读取 config.yaml 生成构建矩阵
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.set-matrix.outputs.repos }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Generate build matrix from config.yaml
        id: set-matrix
        run: |
          # 读取 config.yaml 中的 repositories 列表，输出 JSON 矩阵
          repos=$(yq -o=json '.repositories' config.yaml)
          echo "repos=$repos" >> $GITHUB_OUTPUT
          echo "Config loaded: $(echo "$repos" | jq -c)"

  # 第二步：按矩阵并行构建每个仓库
  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # 单个仓库构建失败不影响其他
      matrix:
        repo: ${{ fromJSON(needs.prepare.outputs.repos) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install tools
        run: |
          wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          sudo apt-get update -qq && sudo apt-get install -y -qq jq

      # ---- 步骤 A：克隆源码 ----
      - name: Clone source repository
        run: |
          NAME="${{ matrix.repo.name }}"
          REPO_URL="${{ matrix.repo.repo_url }}"
          BRANCH="${{ matrix.repo.branch }}"
          REPO_DIR="dockerfiles/$NAME/repo"

          echo "=== [$NAME] 克隆源码 ==="
          echo "  URL:    $REPO_URL"
          echo "  Branch: $BRANCH"
          echo "  Target: $REPO_DIR"

          mkdir -p "$REPO_DIR"
          git clone --branch "$BRANCH" --depth 1 "$REPO_URL" "$REPO_DIR"
          echo "=== [$NAME] 克隆完成，文件列表：==="
          ls -la "$REPO_DIR" | head -20

      # ---- 步骤 B：下载 Release（如果配置了 release_name） ----
      - name: Download GitHub Release
        run: |
          NAME="${{ matrix.repo.name }}"
          REPO_URL="${{ matrix.repo.repo_url }}"
          RELEASE_NAME="${{ matrix.repo.release_name }}"

          if [ -z "$RELEASE_NAME" ] || [ "$RELEASE_NAME" = "null" ]; then
            echo "=== [$NAME] 未配置 release_name，跳过下载 ==="
            exit 0
          fi

          RELEASE_DIR="dockerfiles/$NAME/release"
          mkdir -p "$RELEASE_DIR"

          # 从 repo_url 提取 owner/repo
          OWNER=$(echo "$REPO_URL" | sed -n 's#https://github.com/\([^/]*\)/\([^/]*\)\.git#\1#p')
          GH_REPO=$(echo "$REPO_URL" | sed -n 's#https://github.com/\([^/]*\)/\([^/]*\)\.git#\2#p')

          echo "=== [$NAME] 获取最新 Release: $OWNER/$GH_REPO ==="
          LATEST=$(curl -s "https://api.github.com/repos/${OWNER}/${GH_REPO}/releases/latest")
          TAG=$(echo "$LATEST" | jq -r '.tag_name')
          echo "  Latest tag: $TAG"

          # 模糊匹配 release_name
          DOWNLOAD_URL=$(echo "$LATEST" | jq -r --arg name "$RELEASE_NAME" \
            '.assets[] | select(.name | contains($name)) | .browser_download_url')

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "=== [$NAME] 未找到匹配 '$RELEASE_NAME' 的资源，跳过 ==="
            exit 0
          fi

          FILENAME=$(basename "$DOWNLOAD_URL")
          echo "  Download: $DOWNLOAD_URL"
          curl -L -o "$RELEASE_DIR/$FILENAME" "$DOWNLOAD_URL"

          # 自动解压 tar.gz
          if echo "$FILENAME" | grep -qE '\.(tar\.gz|tgz)$'; then
            echo "  解压 $FILENAME -> $RELEASE_DIR/"
            tar xzf "$RELEASE_DIR/$FILENAME" -C "$RELEASE_DIR"
          fi

          echo "=== [$NAME] Release 文件：==="
          ls -la "$RELEASE_DIR"

      # ---- 步骤 C：构建并推送镜像 ----
      - name: Build and push Docker image
        run: |
          NAME="${{ matrix.repo.name }}"
          DOCKERFILE="./dockerfiles/$NAME/Dockerfile"
          WORK_DIR="dockerfiles/$NAME"
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/$NAME"
          DATE_TAG="$(date +%Y%m%d)"

          echo "=== [$NAME] 构建镜像 ==="
          echo "  Dockerfile: $DOCKERFILE"
          echo "  Context:    $WORK_DIR"
          echo "  Image:      $IMAGE_NAME:latest, $IMAGE_NAME:$DATE_TAG"

          if [ ! -f "$DOCKERFILE" ]; then
            echo "ERROR: Dockerfile not found: $DOCKERFILE"
            exit 1
          fi

          # 从 config.yaml 中读取当前仓库的 build_args
          BUILD_ARGS=""
          BUILD_ARGS_YAML=$(yq ".repositories[] | select(.name == \"$NAME\") | .build_args" config.yaml)
          if [ "$BUILD_ARGS_YAML" != "null" ] && [ -n "$BUILD_ARGS_YAML" ]; then
            echo "  Build args found, parsing..."
            while IFS='=' read -r key value; do
              if [ -n "$key" ] && [ -n "$value" ]; then
                BUILD_ARGS="$BUILD_ARGS --build-arg $key=$value"
                echo "    ARG: $key=$value"
              fi
            done < <(yq -r ".repositories[] | select(.name == \"$NAME\") | .build_args | to_entries | .[] | .key + \"=\" + .value" config.yaml)
          fi

          # 构建平台和推送标志
          PLATFORM="linux/amd64,linux/arm64"
          PUSH_FLAG=""
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            PUSH_FLAG="--push"
          fi

          docker buildx build \
            --platform "$PLATFORM" \
            $BUILD_ARGS \
            -t "$IMAGE_NAME:latest" \
            -t "$IMAGE_NAME:$DATE_TAG" \
            -f "$DOCKERFILE" \
            "$WORK_DIR" \
            $PUSH_FLAG

          echo "=== [$NAME] 构建成功 ==="
          if [ -n "$PUSH_FLAG" ]; then
            echo "  已推送: $IMAGE_NAME:latest, $IMAGE_NAME:$DATE_TAG"
          fi
