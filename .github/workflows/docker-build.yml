name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'dockerfiles/**'
      - 'config.yaml'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'dockerfiles/**'
      - 'config.yaml'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # 读取 config.yaml 生成构建矩阵
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.set-matrix.outputs.repos }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install yq
        run: |
          wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Generate build matrix
        id: set-matrix
        run: |
          repos=$(yq -o=json -I=0 '.repositories' config.yaml)
          echo "repos=$repos" >> $GITHUB_OUTPUT
          echo "Config loaded: $repos"

  # 按矩阵并行构建
  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.prepare.outputs.repos) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          sudo apt-get update -qq && sudo apt-get install -y -qq jq

      # ==== 检查源码/Release 是否有更新 ====
      - name: Check for updates
        id: check
        run: |
          NAME="${{ matrix.repo.name }}"
          REPO_URL="${{ matrix.repo.repo_url }}"
          BRANCH="${{ matrix.repo.branch }}"
          BUILD_TYPE="${{ matrix.repo.build_type }}"
          RELEASE_NAME="${{ matrix.repo.release_name }}"
          [ "$BUILD_TYPE" = "null" ] && BUILD_TYPE="repo"
          [ "$REPO_URL" = "null" ] && REPO_URL=""

          # PR 时强制构建，手动触发按正常逻辑判断
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "  PR 触发，强制构建"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          STATE_FILE=".build-state/${NAME}.txt"
          mkdir -p .build-state

          # 恢复上次构建状态
          if [ -f "$STATE_FILE" ]; then
            LAST_HASH=$(cat "$STATE_FILE")
            echo "  上次构建标记: $LAST_HASH"
          else
            LAST_HASH=""
            echo "  无历史记录，首次构建"
          fi

          CURRENT_HASH=""

          if [ -n "$REPO_URL" ]; then
            OWNER=$(echo "$REPO_URL" | sed -n 's#https://github.com/\([^/]*\)/\([^/.]*\).*#\1#p')
            GH_REPO=$(echo "$REPO_URL" | sed -n 's#https://github.com/[^/]*/\([^/.]*\).*#\1#p')

            # branch 未配置时获取默认分支
            if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
              REPO_INFO=$(curl -s "https://api.github.com/repos/${OWNER}/${GH_REPO}")
              BRANCH=$(echo "$REPO_INFO" | jq -r '.default_branch')
              [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ] && BRANCH="main"
            fi

            if [ "$BUILD_TYPE" = "dockerfile" ] && [ -n "$RELEASE_NAME" ] && [ "$RELEASE_NAME" != "null" ]; then
              # dockerfile 模式：用 Release tag 作为标记
              LATEST=$(curl -s -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER}/${GH_REPO}/releases/latest" 2>/dev/null || echo "")
              CURRENT_HASH=$(echo "$LATEST" | jq -r '.tag_name // empty' 2>/dev/null)
              echo "  当前 Release tag: ${CURRENT_HASH:-N/A}"
            else
              # repo 模式：用分支最新 commit SHA 作为标记
              BRANCH_INFO=$(curl -s -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER}/${GH_REPO}/branches/${BRANCH}" 2>/dev/null || echo "")
              CURRENT_HASH=$(echo "$BRANCH_INFO" | jq -r '.commit.sha // empty' 2>/dev/null)
              echo "  当前 commit: ${CURRENT_HASH:-N/A}"
            fi
          fi

          # 检查本地文件是否有变更（dockerfiles/<name>/ 目录）
          LOCAL_CHANGED=false
          LOCAL_DIFF=$(git diff --name-only HEAD~1 HEAD -- "dockerfiles/${NAME}/" 2>/dev/null || echo "")
          if [ -n "$LOCAL_DIFF" ]; then
            LOCAL_CHANGED=true
            echo "  本地文件有变更:"
            echo "$LOCAL_DIFF" | sed 's/^/    /'
          fi

          # 判断是否需要构建
          if [ -z "$LAST_HASH" ]; then
            echo "  → 首次构建"
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif [ "$CURRENT_HASH" = "$LAST_HASH" ] && ! $LOCAL_CHANGED; then
            echo "  → 源码无更新，本地无变更，跳过构建"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "  → 检测到更新，需要构建"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

          # 保存当前标记（供构建成功后写入）
          echo "$CURRENT_HASH" > "$STATE_FILE.new"

      # ==== 克隆源仓库（仅 build_type=repo）====
      - name: Clone source repository
        if: matrix.repo.build_type != 'dockerfile' && steps.check.outputs.should_build == 'true'
        run: |
          NAME="${{ matrix.repo.name }}"
          REPO_URL="${{ matrix.repo.repo_url }}"
          BRANCH="${{ matrix.repo.branch }}"
          REPO_DIR="dockerfiles/$NAME/repo"

          if [ -z "$REPO_URL" ] || [ "$REPO_URL" = "null" ]; then
            echo "=== [$NAME] 无 repo_url，跳过克隆 ==="
            exit 0
          fi

          # branch 未配置时，从 GitHub API 获取仓库默认分支
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
            OWNER=$(echo "$REPO_URL" | sed -n 's#https://github.com/\([^/]*\)/\([^/.]*\).*#\1#p')
            GH_REPO=$(echo "$REPO_URL" | sed -n 's#https://github.com/[^/]*/\([^/.]*\).*#\1#p')
            REPO_INFO=$(curl -s "https://api.github.com/repos/${OWNER}/${GH_REPO}")
            BRANCH=$(echo "$REPO_INFO" | jq -r '.default_branch')
            if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
              BRANCH="main"
            fi
            echo "  检测到默认分支: $BRANCH"
          fi

          echo "=== [$NAME] 克隆源码 (branch: $BRANCH) ==="
          rm -rf "$REPO_DIR"
          mkdir -p "$REPO_DIR"
          git clone --branch "$BRANCH" --depth 1 "$REPO_URL" "$REPO_DIR"
          echo "  克隆完成"

      # ==== 下载 Release ====
      - name: Download GitHub Release
        if: steps.check.outputs.should_build == 'true'
        run: |
          NAME="${{ matrix.repo.name }}"
          REPO_URL="${{ matrix.repo.repo_url }}"
          RELEASE_NAME="${{ matrix.repo.release_name }}"

          if [ -z "$RELEASE_NAME" ] || [ "$RELEASE_NAME" = "null" ]; then
            echo "=== [$NAME] 无 release_name，跳过 ==="
            exit 0
          fi

          # repo_url 可能省略，但下载 Release 需要它
          if [ -z "$REPO_URL" ] || [ "$REPO_URL" = "null" ]; then
            echo "  ERROR: release_name 配置了但 repo_url 为空，无法获取 Release"
            exit 1
          fi

          RELEASE_DIR="dockerfiles/$NAME/release"
          mkdir -p "$RELEASE_DIR"

          OWNER=$(echo "$REPO_URL" | sed -n 's#https://github.com/\([^/]*\)/\([^/.]*\).*#\1#p')
          GH_REPO=$(echo "$REPO_URL" | sed -n 's#https://github.com/[^/]*/\([^/.]*\).*#\1#p')

          echo "=== [$NAME] 下载 Release: $OWNER/$GH_REPO ==="
          LATEST=$(curl -s -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER}/${GH_REPO}/releases/latest" || echo "")

          # 检查 API 返回是否有效
          if [ -z "$LATEST" ] || ! echo "$LATEST" | jq -e '.tag_name' >/dev/null 2>&1; then
            echo "  ERROR: 无法获取 Release 信息"
            echo "  可能原因：API 限流（未认证 60 次/小时）、仓库无 Release、或仓库名错误"
            echo "  Response: ${LATEST:0:500}"
            exit 1
          fi

          TAG=$(echo "$LATEST" | jq -r '.tag_name')
          echo "  Tag: $TAG"

          # 安全提取下载 URL（assets 为空时不报错）
          DOWNLOAD_URL=$(echo "$LATEST" | jq -r --arg name "$RELEASE_NAME" \
            '(.assets // [])[] | select(.name | contains($name)) | .browser_download_url' | head -1)

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "  ERROR: Release 中未找到匹配 '$RELEASE_NAME' 的文件"
            echo "  可用文件："
            echo "$LATEST" | jq -r '(.assets // [])[] | .name' | sed 's/^/    - /'
            exit 1
          fi

          FILENAME=$(basename "$DOWNLOAD_URL")
          echo "  下载: $FILENAME"
          curl -L -o "$RELEASE_DIR/$FILENAME" "$DOWNLOAD_URL"

          # 解压
          if echo "$FILENAME" | grep -qE '\.(tar\.gz|tgz)$'; then
            tar xzf "$RELEASE_DIR/$FILENAME" -C "$RELEASE_DIR"
            rm -f "$RELEASE_DIR/$FILENAME"
          fi

          echo "  Release 文件："
          ls -la "$RELEASE_DIR"

      # ==== 构建并推送 ====
      - name: Build and push Docker image
        if: steps.check.outputs.should_build == 'true'
        run: |
          NAME="${{ matrix.repo.name }}"
          # Docker 镜像名必须全小写
          IMAGE_NAME_LOWER=$(echo "$NAME" | tr '[:upper:]' '[:lower:]')
          DATE_TAG="$(date +%Y%m%d)"

          # 解析推送目标 registries（支持 dockerhub / ghcr / both）
          REGISTRY_CFG=$(yq -r ".repositories[] | select(.name == \"$NAME\") | .registry" config.yaml)
          [ "$REGISTRY_CFG" = "null" ] || [ -z "$REGISTRY_CFG" ] && REGISTRY_CFG="dockerhub"

          DOCKERHUB_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME_LOWER"
          GHCR_IMAGE="ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME_LOWER"

          # 构建 -t 标签列表
          TAGS=""
          case "$REGISTRY_CFG" in
            dockerhub|both)
              TAGS="$TAGS -t $DOCKERHUB_IMAGE:latest -t $DOCKERHUB_IMAGE:$DATE_TAG"
              ;;
          esac
          case "$REGISTRY_CFG" in
            ghcr|both)
              TAGS="$TAGS -t $GHCR_IMAGE:latest -t $GHCR_IMAGE:$DATE_TAG"
              ;;
          esac

          BUILD_TYPE="${{ matrix.repo.build_type }}"

          # ==== 解析 Dockerfile 路径与构建上下文 ====
          # 路径约定：
          #   - 本地 Dockerfile 里的 COPY 路径相对于 dockerfiles/<name>/
          #   - 源仓库 Dockerfile 里的 COPY 路径相对于克隆后的 repo 根目录
          DOCKERFILE_CFG=$(yq -r ".repositories[] | select(.name == \"$NAME\") | .dockerfile" config.yaml)
          LOCAL_DOCKERFILE="dockerfiles/$NAME/Dockerfile"
          REPO_DIR="dockerfiles/$NAME/repo"

          # 检查是否有本地 Dockerfile
          HAS_LOCAL_DOCKERFILE=false
          if [ -f "$LOCAL_DOCKERFILE" ]; then
            HAS_LOCAL_DOCKERFILE=true
          fi

          if [ "$BUILD_TYPE" = "dockerfile" ]; then
            # dockerfile 模式：本地文件 + Release，上下文是 dockerfiles/<name>/
            DOCKERFILE="$LOCAL_DOCKERFILE"
            CONTEXT="dockerfiles/$NAME"
            echo "  [Dockerfile] 本地文件 (dockerfile 模式)"
          elif $HAS_LOCAL_DOCKERFILE; then
            # repo 模式 + 本地 Dockerfile：
            #   Dockerfile 的 COPY 路径是相对于 dockerfiles/<name>/ 写的（如 ./repo/...、./release/...）
            #   所以上下文必须保持 dockerfiles/<name>/，不复制 Dockerfile
            DOCKERFILE="$LOCAL_DOCKERFILE"
            CONTEXT="dockerfiles/$NAME"
            echo "  [Dockerfile] 本地文件（repo + 本地 Dockerfile），上下文: $CONTEXT"
          elif [ "$DOCKERFILE_CFG" != "null" ] && [ -n "$DOCKERFILE_CFG" ] && [ -f "$REPO_DIR/$DOCKERFILE_CFG" ]; then
            # repo 模式 + config 指定 dockerfile 路径（源仓库内）
            DOCKERFILE="$REPO_DIR/$DOCKERFILE_CFG"
            CONTEXT="$REPO_DIR"
            echo "  [Dockerfile] 源仓库内: $DOCKERFILE_CFG"
          elif [ -f "$REPO_DIR/Dockerfile" ]; then
            # repo 模式 + 源仓库自带 Dockerfile
            DOCKERFILE="$REPO_DIR/Dockerfile"
            CONTEXT="$REPO_DIR"
            echo "  [Dockerfile] 源仓库根目录 Dockerfile"
          else
            echo "  [Dockerfile] ERROR: 未找到 Dockerfile"
            echo "    - 本地: $LOCAL_DOCKERFILE (不存在)"
            echo "    - repo:  $REPO_DIR/Dockerfile (不存在)"
            exit 1
          fi

          # config 中的 context 字段可手动覆盖
          CONTEXT_CFG=$(yq -r ".repositories[] | select(.name == \"$NAME\") | .context" config.yaml)
          if [ "$CONTEXT_CFG" != "null" ] && [ -n "$CONTEXT_CFG" ]; then
            CONTEXT="$CONTEXT_CFG"
            echo "  上下文已手动覆盖: $CONTEXT"
          fi

          echo "============================================"
          echo "  [$NAME] 构建镜像"
          echo "============================================"
          echo "  Dockerfile: $DOCKERFILE"
          echo "  Context:    $CONTEXT"
          echo "  Registry:   $REGISTRY_CFG"
          echo "  Tags:       $TAGS"

          if [ ! -f "$DOCKERFILE" ]; then
            echo "  ERROR: Dockerfile 不存在: $DOCKERFILE"
            exit 1
          fi

          # ==== 预检：验证 Dockerfile 中的 COPY/ADD 源路径是否存在 ====
          echo ""
          echo "  [预检] 验证 COPY/ADD 路径..."
          COPY_PATHS=$(grep -oP '(?:COPY|ADD)\s+\K[^\s]+' "$DOCKERFILE" | grep -v '^--' | sed 's/^"//;s/"$//')
          ALL_OK=true
          while IFS= read -r src; do
            [ -z "$src" ] && continue
            # 跳过绝对路径、--from=、$变量、URL
            case "$src" in
              /*)   continue ;;
              --*)  continue ;;
              \$*)  continue ;;
              http*) continue ;;
            esac
            # 去掉 ["..."] 引号
            src=$(echo "$src" | sed 's/^"//;s/"$//')
            if [ -e "$CONTEXT/$src" ]; then
              echo "    OK  $src"
            else
              echo "    MISS  $src  (上下文: $CONTEXT)"
              ALL_OK=false
            fi
          done <<< "$COPY_PATHS"

          if ! $ALL_OK; then
            echo ""
            echo "  ========================================"
            echo "  [预检] 上下文目录结构 ($CONTEXT):"
            find "$CONTEXT" -maxdepth 2 -not -path '*/.git/*' | head -40
            echo "  ========================================"
            echo "  提示: COPY 源路径是相对于构建上下文 ($CONTEXT) 的"
            echo "  请检查 Dockerfile 中的路径是否正确"
            echo "  ========================================"
          fi

          # build_args
          BUILD_ARGS=""
          BUILD_ARGS_YAML=$(yq ".repositories[] | select(.name == \"$NAME\") | .build_args" config.yaml)
          if [ "$BUILD_ARGS_YAML" != "null" ] && [ -n "$BUILD_ARGS_YAML" ]; then
            while IFS='=' read -r key value; do
              if [ -n "$key" ] && [ -n "$value" ]; then
                BUILD_ARGS="$BUILD_ARGS --build-arg $key=$value"
                echo "  Build arg:  $key=$value"
              fi
            done < <(yq -r ".repositories[] | select(.name == \"$NAME\") | .build_args | to_entries | .[] | .key + \"=\" + .value" config.yaml)
          fi

          # 推送标志
          PUSH_FLAG=""
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            PUSH_FLAG="--push"
          fi

          echo "  开始构建..."
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            $BUILD_ARGS \
            $TAGS \
            -f "$DOCKERFILE" \
            "$CONTEXT" \
            $PUSH_FLAG

          echo "============================================"
          echo "  [$NAME] 构建成功"
          if [ -n "$PUSH_FLAG" ]; then
            case "$REGISTRY_CFG" in
              dockerhub|both)
                echo "  DockerHub: $DOCKERHUB_IMAGE:latest"
                echo "             $DOCKERHUB_IMAGE:$DATE_TAG"
              ;;
            esac
            case "$REGISTRY_CFG" in
              ghcr|both)
                echo "  GHCR:      $GHCR_IMAGE:latest"
                echo "             $GHCR_IMAGE:$DATE_TAG"
              ;;
            esac
          fi
          echo "============================================"

          # 构建成功后保存状态（用于下次跳过判断）
          if [ -f ".build-state/${NAME}.txt.new" ]; then
            cp ".build-state/${NAME}.txt.new" ".build-state/${NAME}.txt"
            echo "  构建状态已写入"
          fi

      - name: Commit build state
        if: steps.check.outputs.should_build == 'true' && always()
        run: |
          NAME="${{ matrix.repo.name }}"
          STATE_FILE=".build-state/${NAME}.txt"

          if [ ! -f "$STATE_FILE" ]; then
            echo "  无状态文件，跳过提交"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$STATE_FILE"

          if git diff --cached --quiet; then
            echo "  状态无变化，跳过提交"
            exit 0
          fi

          git commit -m "chore: update build state for ${NAME} [skip ci]"
          # 拉取合并后推送，处理并行 job 的竞争
          git pull --rebase --no-edit origin main || true
          git push origin main || echo "  WARN: 推送状态文件失败（不影响镜像构建）"

      - name: Skipped (no updates)
        if: steps.check.outputs.should_build == 'false'
        run: |
          NAME="${{ matrix.repo.name }}"
          echo "============================================"
          echo "  [$NAME] 源码无更新，跳过构建"
          echo "============================================"

      # ==== 更新 DockerHub 描述信息 ====
      - name: Update DockerHub description
        if: steps.check.outputs.should_build == 'true' && github.event_name != 'pull_request' && matrix.repo.registry != 'ghcr'
        run: |
          NAME="${{ matrix.repo.name }}"
          REPO_URL="${{ matrix.repo.repo_url }}"
          BUILD_TYPE="${{ matrix.repo.build_type }}"
          USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          TOKEN="${{ secrets.DOCKERHUB_TOKEN }}"

          # 处理空值
          [ "$REPO_URL" = "null" ] && REPO_URL=""
          [ "$BUILD_TYPE" = "null" ] && BUILD_TYPE="repo"

          # 获取 README 内容（最大 25000 字符，DockerHub 限制）
          README_CONTENT=""
          REPO_DIR="dockerfiles/$NAME/repo"

          if [ "$BUILD_TYPE" != "dockerfile" ] && [ -d "$REPO_DIR" ]; then
            if [ -f "$REPO_DIR/README.md" ]; then
              README_CONTENT=$(cat "$REPO_DIR/README.md" | head -c 25000)
            elif [ -f "$REPO_DIR/README" ]; then
              README_CONTENT=$(cat "$REPO_DIR/README" | head -c 25000)
            fi
            echo "  README: 从克隆仓库读取 ($(echo "$README_CONTENT" | wc -c) bytes)"
          elif [ -n "$REPO_URL" ]; then
            OWNER=$(echo "$REPO_URL" | sed -n 's#https://github.com/\([^/]*\)/\([^/.]*\).*#\1#p')
            GH_Name=$(echo "$REPO_URL" | sed -n 's#https://github.com/[^/]*/\([^/.]*\).*#\1#p')
            if [ -n "$OWNER" ] && [ -n "$GH_Name" ]; then
              README_CONTENT=$(curl -sf -H "Accept: application/vnd.github.raw" \
                "https://api.github.com/repos/${OWNER}/${GH_Name}/readme" 2>/dev/null | head -c 25000)
              echo "  README: 从 GitHub API 获取 ($(echo "$README_CONTENT" | wc -c) bytes)"
            fi
          fi

          # 用 jq 安全构建 JSON（避免特殊字符破坏格式）
          SHORT_DESC="Auto-built from ${REPO_URL:-N/A}"
          FULL_DESC=$(printf "## Source Repository\n\n%s\n\n---\n\n%s" "${REPO_URL:-N/A}" "${README_CONTENT}")

          PAYLOAD=$(jq -n \
            --arg desc "$SHORT_DESC" \
            --arg full "$FULL_DESC" \
            '{description: $desc, full_description: $full}')

          echo "  准备更新 DockerHub 描述: ${USERNAME}/${NAME}"

          # ==== 核心修复：Docker Hub API 不支持直接用 PAT 做 Basic Auth，必须先换取 JWT ====
          echo "  🔐 正在获取 Bearer Token..."
          AUTH_RESP=$(curl -s -X POST "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${USERNAME}\", \"password\": \"${TOKEN}\"}")
          JWT_TOKEN=$(echo "$AUTH_RESP" | jq -r '.token')
          if [ -z "$JWT_TOKEN" ] || [ "$JWT_TOKEN" = "null" ]; then
            echo "  ❌ 获取 Token 失败！请检查 DOCKERHUB_USERNAME 和 DOCKERHUB_TOKEN。"
            echo "  Response: $AUTH_RESP"
            exit 1
          fi
          # 发送 PATCH 请求更新描述
          UPDATE_RESP=$(curl -s -w "\n%{http_code}" -X PATCH \
            -H "Authorization: Bearer $JWT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://hub.docker.com/v2/repositories/${USERNAME}/${NAME}/")

          HTTP_CODE=$(echo "$UPDATE_RESP" | tail -1)
          BODY=$(echo "$UPDATE_RESP" | sed '$d')

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
            echo "  ✅ 描述已更新 (HTTP $HTTP_CODE)"
            echo "  🔗 https://hub.docker.com/r/${USERNAME}/${NAME}"
          else
            echo "  ❌ WARN: 描述更新失败 (HTTP $HTTP_CODE)"
            echo "  Response: $BODY"
            if [ "$HTTP_CODE" = "403" ] || [ "$HTTP_CODE" = "401" ]; then
              echo ""
              echo "  ================================================"
              echo "  [DockerHub 认证/权限失败]"
              echo "  1. 确保 DOCKERHUB_TOKEN 是 Personal Access Token"
              echo "  2. 确保 Token 具有 Read & Write 权限"
