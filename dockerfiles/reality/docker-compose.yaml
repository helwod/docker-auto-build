services:
  reality:
    image: wrlin1218/reality:latest
    container_name: reality
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "38443:443"
      # - "127.0.0.1:38442:38442"               # 可选：启用 SOCKS5 后只暴露给宿主机本机
    environment:
      - DEST=www.apple.com:443                     # 目标站点，默认为www.apple.com:443
      - SERVERNAMES=www.apple.com images.apple.com # 服务器名称，默认为www.apple.com images.apple.com
      - EXTERNAL_PORT=38443                        # 外部端口，默认为443，需要和外部映射端口一致
      # - SOCKS5_ENABLED=true                      # 可选：启用 SOCKS5 入站代理
      # - SOCKS5_LISTEN=0.0.0.0                    # SOCKS5 容器内监听地址
      # - SOCKS5_PORT=38442                        # SOCKS5 容器内监听端口
      # - SOCKS5_USER=change-me                    # SOCKS5 用户名；不建议无认证暴露
      # - SOCKS5_PASS=change-me                    # SOCKS5 密码
      # - SOCKS5_UDP=true                          # 是否开启 UDP
      # - SOCKS5_ALLOW_NO_AUTH=true                # 仅本机/可信网络可考虑无认证
    volumes:
      - .:/config       # 保存配置信息
    networks:
      - reality-network

networks:
  reality-network:
    driver: bridge
